<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NEON WORLD '99 — ADMIN PAYOUT</title>
  <style>
    body{
      margin:0;
      padding:24px 14px 40px;
      background:#000;
      color:#fff;
      font-family:monospace;
      text-align:center;
    }
    .wrap{
      max-width:520px;
      margin:0 auto;
    }
    h1{
      color:#00d4ff;
      margin:8px 0 6px;
    }
    .sub{
      color:rgba(255,255,255,.7);
      font-size:13px;
      margin-bottom:18px;
    }
    .box{
      border:1px solid rgba(255,255,255,.14);
      border-radius:14px;
      background:rgba(255,255,255,.03);
      padding:14px;
      margin-bottom:14px;
      text-align:left;
    }
    .label{
      color:#00d4ff;
      font-size:12px;
      margin-bottom:6px;
    }
    .value{
      color:#fff;
      font-size:15px;
      word-break:break-word;
    }
    input{
      width:100%;
      box-sizing:border-box;
      margin-top:6px;
      padding:12px;
      border-radius:10px;
      border:1px solid rgba(255,255,255,.18);
      background:rgba(0,0,0,.45);
      color:#fff;
      font-family:monospace;
      font-size:14px;
    }
    button{
      width:100%;
      padding:14px 16px;
      border-radius:12px;
      border:none;
      background:#00d4ff;
      color:#000;
      font-family:monospace;
      font-weight:bold;
      margin-top:10px;
    }
    .btn2{
      background:rgba(255,255,255,.06);
      color:#fff;
      border:1px solid rgba(255,255,255,.18);
    }
    #status{
      margin-top:12px;
      min-height:24px;
      color:#a8ff3e;
      white-space:pre-line;
    }
    #debug{
      margin-top:12px;
      min-height:24px;
      color:#ffd166;
      white-space:pre-line;
      text-align:left;
      font-size:12px;
      border:1px solid rgba(255,255,255,.12);
      border-radius:12px;
      padding:12px;
      background:rgba(255,255,255,.03);
    }
    a{
      color:#888;
      text-decoration:none;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>ADMIN PAYOUT</h1>
    <div class="sub">Open inside Phantom browser with treasury wallet selected</div>

    <div class="box">
      <div class="label">TREASURY WALLET</div>
      <div class="value" id="treasuryWallet">8UH2aQubZ5kjR5PpesoPio4zkAfafoMY5hHuKrPYz6ct</div>
    </div>

    <div class="box">
      <div class="label">WEEK</div>
      <div class="value" id="weekKey">Loading...</div>
    </div>

    <div class="box">
      <div class="label">WINNER WALLET</div>
      <div class="value" id="winnerWallet">Loading...</div>
      <button class="btn2" id="copyWalletBtn" type="button">COPY WINNER WALLET</button>
    </div>

    <div class="box">
      <div class="label">AMOUNT</div>
      <div class="value" id="amountSol">Loading...</div>
    </div>

    <div class="box">
      <div class="label">STATUS</div>
      <div class="value" id="payoutStatus">Loading...</div>
    </div>

    <div class="box">
      <div class="label">ADMIN SECRET</div>
      <input id="adminSecret" type="password" placeholder="Enter admin secret">
    </div>

    <button id="sendPrizeBtn" type="button">SEND PRIZE</button>

    <div id="status"></div>
    <div id="debug"></div>

    <div style="margin-top:18px;">
      <a href="index.html">Back Home</a>
    </div>
  </div>

  <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.js"></script>
  <script>
    const TREASURY = "8UH2aQubZ5kjR5PpesoPio4zkAfafoMY5hHuKrPYz6ct";
    const PAYOUT_WEEK_KEY = "2026-W10";

    let currentWeekKey = "";
    let winnerWallet = "";
    let amountLamports = 0;

    function setStatus(text, isError = false) {
      const el = document.getElementById("status");
      el.style.color = isError ? "#ff6b6b" : "#a8ff3e";
      el.textContent = text || "";
    }

    function debug(text) {
      const el = document.getElementById("debug");
      el.textContent += (el.textContent ? "\n" : "") + String(text);
    }

    function getProvider() {
      if (window.phantom?.solana) return window.phantom.solana;
      if (window.solana?.isPhantom) return window.solana;
      if (window.solana) return window.solana;
      return null;
    }

    async function loadPayoutStatus() {
      setStatus("Loading payout...");
      debug("Loading /api/payout-status for " + PAYOUT_WEEK_KEY);

      try {
        const r = await fetch(`/api/payout-status?week_key=${encodeURIComponent(PAYOUT_WEEK_KEY)}`);
        const j = await r.json();

        debug("payout-status response: " + JSON.stringify(j));

        if (!r.ok || !j.ok) {
          throw new Error(j.error || "Failed to load payout");
        }

        if (!j.exists) {
          throw new Error("No payout job exists for this week");
        }

        currentWeekKey = String(j.week_key || "");
        winnerWallet = String(j.winner_wallet || "");
        amountLamports = Number(j.amount_lamports || 0);

        document.getElementById("weekKey").textContent = currentWeekKey || "N/A";
        document.getElementById("winnerWallet").textContent = winnerWallet || "N/A";
        document.getElementById("amountSol").textContent = `${Number(j.amount_sol || 0).toFixed(3)} SOL`;
        document.getElementById("payoutStatus").textContent = j.status || "unknown";

        if (j.status === "sent" && j.tx_signature) {
          setStatus(`Already sent.\nTX: ${j.tx_signature}`);
        } else {
          setStatus("Payout is pending.");
        }
      } catch (e) {
        setStatus(String(e.message || e), true);
        debug("load error: " + String(e.message || e));
      }
    }

    document.getElementById("copyWalletBtn").onclick = async () => {
      try {
        await navigator.clipboard.writeText(winnerWallet || "");
        setStatus("Winner wallet copied.");
        debug("Winner wallet copied");
      } catch (e) {
        setStatus("Could not copy wallet.", true);
        debug("copy error: " + String(e.message || e));
      }
    };

    async function sendPrize() {
      debug("SEND PRIZE clicked");

      const adminSecret = document.getElementById("adminSecret").value.trim();

      if (!adminSecret) {
        setStatus("Admin secret required.", true);
        debug("Admin secret missing");
        return;
      }

      if (!winnerWallet) {
        setStatus("Winner wallet missing.", true);
        debug("Winner wallet missing");
        return;
      }

      if (!amountLamports || amountLamports <= 0) {
        setStatus("Invalid payout amount.", true);
        debug("Invalid payout amount");
        return;
      }

      const provider = getProvider();
      debug("Provider exists: " + !!provider);

      if (!provider) {
        setStatus("Open this page inside Phantom browser.", true);
        debug("No Phantom provider found");
        return;
      }

      const btn = document.getElementById("sendPrizeBtn");
      btn.disabled = true;
      btn.textContent = "CONNECTING...";

      try {
        debug("Connecting Phantom...");
        const connected = await provider.connect();
        const connectedWallet = String((connected?.publicKey || provider.publicKey || "").toString());
        debug("Connected wallet: " + connectedWallet);

        if (connectedWallet !== TREASURY) {
          throw new Error("Connected Phantom wallet is not the treasury wallet.");
        }

        btn.textContent = "PREPARING...";
        debug("Creating connection to /api/solana-rpc");

        const connection = new solanaWeb3.Connection(
          `${location.origin}/api/solana-rpc`,
          "confirmed"
        );

        const latest = await connection.getLatestBlockhash("confirmed");
        debug("Latest blockhash loaded");

        const tx = new solanaWeb3.Transaction().add(
          solanaWeb3.SystemProgram.transfer({
            fromPubkey: provider.publicKey,
            toPubkey: new solanaWeb3.PublicKey(winnerWallet),
            lamports: amountLamports
          })
        );

        tx.feePayer = provider.publicKey;
        tx.recentBlockhash = latest.blockhash;

        btn.textContent = "WAITING FOR APPROVAL...";
        debug("Calling signAndSendTransaction...");

        const sendResult = await provider.signAndSendTransaction(tx);
        const signature =
          typeof sendResult === "string"
            ? sendResult
            : sendResult.signature;

        debug("Signature: " + signature);

        if (!signature) {
          throw new Error("No transaction signature returned");
        }

        btn.textContent = "CONFIRMING...";
        debug("Confirming transaction...");

        await connection.confirmTransaction(
          {
            signature,
            blockhash: latest.blockhash,
            lastValidBlockHeight: latest.lastValidBlockHeight
          },
          "confirmed"
        );

        btn.textContent = "SAVING...";
        debug("Calling /api/mark-payout-sent");

        const r = await fetch("/api/mark-payout-sent", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            week_key: currentWeekKey,
            tx_signature: signature,
            admin_secret: adminSecret
          })
        });

        const j = await r.json();
        debug("mark-payout-sent response: " + JSON.stringify(j));

        if (!r.ok || !j.ok) {
          throw new Error(j.error || "Transaction sent but payout record update failed");
        }

        setStatus(`Prize sent successfully.\nTX: ${signature}`);
        await loadPayoutStatus();
      } catch (e) {
        setStatus(String(e.message || e), true);
        debug("sendPrize error: " + String(e.message || e));
      } finally {
        btn.disabled = false;
        btn.textContent = "SEND PRIZE";
      }
    }

    document.getElementById("sendPrizeBtn").onclick = sendPrize;

    debug("Page loaded");
    loadPayoutStatus();
  </script>
</body>
</html>
