<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>NEON WORLD '99 — ADMIN PAYOUT</title>
  <style>
    body{
      margin:0;
      padding:24px 16px 36px;
      background:
        radial-gradient(circle at top, rgba(255,45,107,.08), transparent 35%),
        radial-gradient(circle at bottom, rgba(0,212,255,.06), transparent 35%),
        #000;
      color:#fff;
      font-family:monospace;
      text-align:center;
    }

    h1{
      color:#ffd166;
      margin:8px 0 10px;
      text-shadow:0 0 10px rgba(255,209,102,.20);
    }

    .wrap{
      max-width:640px;
      margin:0 auto;
    }

    .card{
      border:1px solid rgba(255,255,255,.12);
      border-radius:16px;
      background:rgba(255,255,255,.03);
      padding:18px 16px;
      margin-bottom:16px;
      text-align:left;
    }

    .label{
      color:#8b8b8b;
      font-size:12px;
      margin-bottom:8px;
      text-transform:uppercase;
      letter-spacing:.08em;
    }

    .value{
      font-size:15px;
      line-height:1.8;
      color:#fff;
      word-break:break-word;
    }

    .muted{
      color:#9a9a9a;
      font-size:12px;
      line-height:1.6;
    }

    .actions{
      display:flex;
      flex-direction:column;
      gap:12px;
      margin:18px 0;
    }

    input{
      width:100%;
      box-sizing:border-box;
      padding:14px 12px;
      border-radius:12px;
      border:1px solid #333;
      background:#111;
      color:#fff;
      font-family:monospace;
      font-size:14px;
      margin-bottom:10px;
    }

    button{
      width:100%;
      padding:16px 14px;
      border:none;
      border-radius:14px;
      font-family:monospace;
      font-size:15px;
      font-weight:bold;
    }

    .primary{
      background:#ffd166;
      color:#000;
    }

    .secondary{
      background:#111;
      color:#ddd;
      border:1px solid #333;
    }

    .danger{
      background:#8b1e3f;
      color:#fff;
    }

    #log{
      min-height:160px;
      white-space:pre-wrap;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>ADMIN PAYOUT</h1>

    <div class="card">
      <div class="label">Controls</div>
      <input id="adminSecret" type="password" placeholder="ADMIN_SECRET" />
      <input id="weekKey" type="text" placeholder="Week key (example: 2026-W11). Leave empty for current week." />
      <input id="txSignature" type="text" placeholder="Payout tx signature (for mark sent)" />
      <div class="muted">
        Flow:<br>
        1. Load week status<br>
        2. Prepare payout job<br>
        3. Send SOL manually from treasury wallet<br>
        4. Paste tx signature and mark sent
      </div>
    </div>

    <div class="card">
      <div class="label">Current Result</div>
      <div id="result" class="value">No data loaded yet.</div>
    </div>

    <div class="actions">
      <button class="secondary" id="loadBtn">LOAD WEEK STATUS</button>
      <button class="primary" id="prepareBtn">PREPARE WEEKLY PAYOUT</button>
      <button class="danger" id="markBtn">MARK PAYOUT SENT</button>
      <button class="secondary" onclick="location.href='/index.html'">HOME</button>
    </div>

    <div class="card">
      <div class="label">System Log</div>
      <div id="log" class="muted">Admin payout panel ready...</div>
    </div>
  </div>

  <script>
    function logLine(msg) {
      const el = document.getElementById("log");
      el.textContent += "\n" + msg;
      el.scrollTop = el.scrollHeight;
    }

    function getWeekKey() {
      return String(document.getElementById("weekKey").value || "").trim();
    }

    function getAdminSecret() {
      return String(document.getElementById("adminSecret").value || "").trim();
    }

    function getTxSignature() {
      return String(document.getElementById("txSignature").value || "").trim();
    }

    function setResult(obj) {
      document.getElementById("result").textContent = JSON.stringify(obj, null, 2);
    }

    async function loadWeekStatus() {
      try {
        const weekKey = getWeekKey();
        const url = weekKey
          ? `/api/weekly-winner?week_key=${encodeURIComponent(weekKey)}`
          : "/api/weekly-winner";

        const r = await fetch(url);
        const j = await r.json();

        if (!r.ok || !j.ok) {
          throw new Error(j.error || "Failed to load weekly status");
        }

        setResult(j);
        logLine("Week status loaded");
      } catch (e) {
        logLine("Load failed: " + String(e.message || e));
        alert("Load failed:\n" + String(e.message || e));
      }
    }

    async function preparePayout() {
      try {
        const adminSecret = getAdminSecret();
        if (!adminSecret) {
          alert("ADMIN_SECRET required");
          return;
        }

        const body = {
          admin_secret: adminSecret
        };

        const weekKey = getWeekKey();
        if (weekKey) {
          body.week_key = weekKey;
        }

        const r = await fetch("/api/prepare-weekly-payout", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(body)
        });

        const j = await r.json();

        if (!r.ok || !j.ok) {
          throw new Error(j.error || "Failed to prepare payout");
        }

        setResult(j);
        logLine("Payout prepared");
      } catch (e) {
        logLine("Prepare failed: " + String(e.message || e));
        alert("Prepare failed:\n" + String(e.message || e));
      }
    }

    async function markPayoutSent() {
      try {
        const adminSecret = getAdminSecret();
        const txSignature = getTxSignature();

        if (!adminSecret) {
          alert("ADMIN_SECRET required");
          return;
        }

        if (!txSignature) {
          alert("tx signature required");
          return;
        }

        const body = {
          admin_secret: adminSecret,
          tx_signature: txSignature
        };

        const weekKey = getWeekKey();
        if (weekKey) {
          body.week_key = weekKey;
        }

        const r = await fetch("/api/mark-payout-sent", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(body)
        });

        const j = await r.json();

        if (!r.ok || !j.ok) {
          throw new Error(j.error || "Failed to mark payout sent");
        }

        setResult(j);
        logLine("Payout marked sent");
      } catch (e) {
        logLine("Mark failed: " + String(e.message || e));
        alert("Mark failed:\n" + String(e.message || e));
      }
    }

    document.getElementById("loadBtn").addEventListener("click", loadWeekStatus);
    document.getElementById("prepareBtn").addEventListener("click", preparePayout);
    document.getElementById("markBtn").addEventListener("click", markPayoutSent);
  </script>
</body>
</html>
