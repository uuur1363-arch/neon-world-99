<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NEON WORLD '99</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <div style="text-align:center;margin-top:120px;font-family:monospace;color:#00d4ff">
    <h1>NEON WORLD '99</h1>

    <p>INSERT COIN</p>

    <div
      id="jackpotBox"
      style="
        margin:18px auto 14px auto;
        max-width:380px;
        padding:12px 14px;
        border:1px solid rgba(0,212,255,.35);
        border-radius:12px;
        color:#ffffff;
        background:rgba(0,212,255,.08);
        font-size:14px;
        line-height:1.6;
      "
    >
      <div style="color:#00d4ff;font-weight:bold;">WEEKLY JACKPOT</div>
      <div id="jackpotAmount">Loading...</div>
      <div id="jackpotEntries" style="color:rgba(255,255,255,.7);font-size:12px;"></div>
    </div>

    <div
      id="leaderBox"
      style="
        margin:0 auto 14px auto;
        max-width:380px;
        padding:12px 14px;
        border:1px solid rgba(255,45,107,.30);
        border-radius:12px;
        color:#ffffff;
        background:rgba(255,45,107,.08);
        font-size:14px;
        line-height:1.6;
      "
    >
      <div style="color:#ff2d6b;font-weight:bold;">CURRENT LEADER</div>
      <div id="leaderWallet">Loading...</div>
      <div id="leaderScore" style="color:rgba(255,255,255,.7);font-size:12px;"></div>
    </div>

    <div
      id="winnerBox"
      style="
        margin:0 auto 26px auto;
        max-width:380px;
        padding:12px 14px;
        border:1px solid rgba(168,255,62,.30);
        border-radius:12px;
        color:#ffffff;
        background:rgba(168,255,62,.08);
        font-size:14px;
        line-height:1.6;
      "
    >
      <div style="color:#a8ff3e;font-weight:bold;">WEEKLY WINNER</div>
      <div id="winnerWallet">Loading...</div>
      <div id="winnerScore" style="color:rgba(255,255,255,.7);font-size:12px;"></div>
    </div>

    <button onclick="goFree()">START GAME</button>

    <br><br>

    <button onclick="goRankedEntry()">RANKED MODE (0.01 SOL)</button>

    <br><br>

    <button onclick="goBoard()">LEADERBOARD</button>
  </div>

  <script>
    function goRankedEntry() {
      localStorage.setItem("neon99_mode", "ranked");
      location.href = "ranked.html";
    }

    function shortWallet(w) {
      const s = String(w || "");
      if (!s) return "N/A";
      if (s.length <= 12) return s;
      return s.slice(0, 4) + "..." + s.slice(-4);
    }

    async function loadHomeStats() {
      const amountEl = document.getElementById("jackpotAmount");
      const entriesEl = document.getElementById("jackpotEntries");
      const leaderWalletEl = document.getElementById("leaderWallet");
      const leaderScoreEl = document.getElementById("leaderScore");
      const winnerWalletEl = document.getElementById("winnerWallet");
      const winnerScoreEl = document.getElementById("winnerScore");

      try {
        const r = await fetch("/api/weekly-winner");
        const j = await r.json();

        if (!r.ok || !j.ok) {
          amountEl.textContent = "Unavailable";
          entriesEl.textContent = "";
          leaderWalletEl.textContent = "Unavailable";
          leaderScoreEl.textContent = "";
          winnerWalletEl.textContent = "Unavailable";
          winnerScoreEl.textContent = "";
          return;
        }

        const jackpotSol = Number(j.jackpot_sol || 0);
        const entryCount = Number(j.entry_count || 0);
        const weekKey = String(j.week_key || "");

        amountEl.textContent = `${jackpotSol.toFixed(3)} SOL`;
        entriesEl.textContent = `${entryCount} ranked entries • ${weekKey}`;

        if (j.leader_wallet) {
          leaderWalletEl.textContent = shortWallet(j.leader_wallet);
          leaderScoreEl.textContent = `TOP SCORE: ${Number(j.leader_score || 0)} • ${j.leader_city || "Unknown"}`;
        } else {
          leaderWalletEl.textContent = "No ranked scores yet";
          leaderScoreEl.textContent = "Be the first leader this week";
        }

        if (j.winner_wallet) {
          winnerWalletEl.textContent = shortWallet(j.winner_wallet);
          winnerScoreEl.textContent = `WINNING SCORE: ${Number(j.winner_score || 0)}`;
        } else {
          winnerWalletEl.textContent = "Week still open";
          winnerScoreEl.textContent = "Winner will appear after weekly close";
        }
      } catch (_) {
        amountEl.textContent = "Unavailable";
        entriesEl.textContent = "";
        leaderWalletEl.textContent = "Unavailable";
        leaderScoreEl.textContent = "";
        winnerWalletEl.textContent = "Unavailable";
        winnerScoreEl.textContent = "";
      }
    }

    loadHomeStats();
  </script>

  <script src="game.js"></script>
</body>
</html>
