<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>NEON WORLD '99</title>

<style>

body{
background:black;
color:white;
font-family:monospace;
margin:0;
padding:30px;
text-align:center;
}

h1{
color:#00d4ff;
margin-bottom:10px;
}

.panel{
margin:auto;
max-width:420px;
border:1px solid rgba(255,255,255,.2);
border-radius:14px;
padding:18px;
margin-bottom:18px;
background:rgba(255,255,255,.05);
}

.jackpot{
font-size:22px;
color:#00ff9c;
}

.leader{
font-size:12px;
color:#aaa;
margin-top:6px;
}

button{

width:100%;
padding:14px;
margin-top:10px;

border:none;
border-radius:10px;

font-size:16px;
font-weight:bold;
font-family:monospace;

background:#00d4ff;
color:black;

}

button.secondary{
background:#222;
color:#ccc;
border:1px solid #444;
}

</style>

</head>

<body>

<h1>NEON WORLD '99</h1>

<div class="panel">

<div>WEEKLY JACKPOT</div>

<div class="jackpot" id="jackpot">
loading...
</div>

<div class="leader" id="leader">
loading leader...
</div>

</div>

<div class="panel">

<button onclick="goFree()">
START FREE MODE
</button>

<button onclick="location.href='ranked.html'">
RANKED MODE (0.01 SOL)
</button>

<button class="secondary" onclick="goBoard()">
LEADERBOARD
</button>

</div>

<script src="game.js"></script>

<script>

async function loadJackpot(){

try{

const r=await fetch("/api/jackpot")

const j=await r.json()

if(!j.ok) return

document.getElementById("jackpot").textContent =
j.jackpot_sol.toFixed(3)+" SOL"

document.getElementById("leader").textContent =
"Leader: "+(j.leader_wallet?.slice(0,6) || "—")+
" | Score: "+(j.leader_score || 0)

}catch{}

}

// initial load
loadJackpot()

// auto refresh
setInterval(loadJackpot,10000)

</script>

</body>

</html>
