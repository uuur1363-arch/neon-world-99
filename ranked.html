<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ranked Entry</title>
  <style>
    body{
      background:black;
      color:white;
      font-family:monospace;
      text-align:center;
      margin:0;
      padding:40px 20px;
    }

    .box{
      max-width:420px;
      margin:80px auto 0;
      padding:24px;
      border:1px solid rgba(255,255,255,.18);
      border-radius:14px;
      background:rgba(255,255,255,.03);
    }

    h2{
      color:#00d4ff;
      margin-top:0;
    }

    button{
      padding:14px 22px;
      font-size:16px;
      background:#00d4ff;
      color:black;
      border:none;
      border-radius:10px;
      font-weight:bold;
      width:100%;
      margin-top:10px;
    }

    .muted{
      color:#999;
      font-size:13px;
      line-height:1.5;
    }

    #status{
      margin-top:16px;
      font-size:14px;
      color:#fff;
      min-height:40px;
      white-space:pre-wrap;
    }

    a{
      color:#888;
      text-decoration:none;
    }
  </style>
</head>
<body>

  <div class="box">
    <h2>RANKED MODE</h2>
    <p>Entry Fee: <b>0.01 SOL</b></p>
    <p class="muted">
      Payment unlocks ranked mode for <b>24 hours</b>.
    </p>

    <button onclick="pay()">CONNECT WALLET & PAY</button>

    <div id="status"></div>

    <br>
    <a href="city.html">Back</a>
  </div>

  <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.js"></script>

  <script>
    const DEST = "8UH2aQubZ5kjR5PpesoPio4zkAfafoMY5hHuKrPYz6ct";
    const ENTRY_LAMPORTS = 10000000; // 0.01 SOL

    function setStatus(msg){
      document.getElementById("status").textContent = msg;
    }

    function getProvider(){
      if (window.phantom && window.phantom.solana) return window.phantom.solana;
      if (window.solana) return window.solana;
      return null;
    }

    async function pay(){
      try{
        setStatus("Checking wallet...");

        const provider = getProvider();

        if(!provider){
          setStatus("Phantom Wallet not found.\nOpen this page inside Phantom browser.");
          alert("Phantom Wallet not found.\nOpen this site inside Phantom browser.");
          return;
        }

        setStatus("Connecting wallet...");
        await provider.connect();

        const connection = new solanaWeb3.Connection(
          "https://api.mainnet-beta.solana.com",
          "confirmed"
        );

        setStatus("Preparing transaction...");

        const transaction = new solanaWeb3.Transaction().add(
          solanaWeb3.SystemProgram.transfer({
            fromPubkey: provider.publicKey,
            toPubkey: new solanaWeb3.PublicKey(DEST),
            lamports: ENTRY_LAMPORTS
          })
        );

        const latest = await connection.getLatestBlockhash("confirmed");
        transaction.feePayer = provider.publicKey;
        transaction.recentBlockhash = latest.blockhash;

        setStatus("Waiting for Phantom approval...");

        // Mobil Phantom için en güvenli yöntem
        const result = await provider.signAndSendTransaction(transaction);
        const signature = result.signature;

        setStatus("Confirming payment...\n" + signature);

        await connection.confirmTransaction({
          signature,
          blockhash: latest.blockhash,
          lastValidBlockHeight: latest.lastValidBlockHeight
        }, "confirmed");

        setStatus("Payment successful!\nRanked unlocked for 24 hours.");

        const until = Date.now() + 86400000; // 24 saat
        localStorage.setItem("neon99_pass_until", String(until));

        // jackpot endpoint varsa artır
        try{
          await fetch("/api/jackpot", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ add_sol: 0.01 })
          });
        }catch(e){}

        alert("Payment successful! Ranked unlocked for 24 hours.");
        location.href = "city.html";

      }catch(err){
        console.error(err);
        setStatus("Payment failed:\n" + (err?.message || String(err)));
        alert("Payment failed:\n" + (err?.message || String(err)));
      }
    }
  </script>

</body>
</html>
