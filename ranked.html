<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ranked Entry</title>
  <style>
    body{
      background:black;
      color:white;
      font-family:monospace;
      text-align:center;
      margin:0;
      padding:40px 20px;
    }
    .box{
      max-width:420px;
      margin:80px auto;
      padding:24px;
      border:1px solid rgba(255,255,255,.18);
      border-radius:14px;
      background:rgba(255,255,255,.03);
    }
    button{
      padding:14px 22px;
      font-size:16px;
      background:#00d4ff;
      color:black;
      border:none;
      border-radius:10px;
      width:100%;
      font-weight:bold;
      cursor:pointer;
    }
    button:disabled{
      opacity:.6;
      cursor:not-allowed;
    }
    #status{
      margin-top:14px;
      min-height:30px;
      color:#9fe8ff;
      white-space:pre-line;
    }
    a{
      color:#888;
      text-decoration:none;
    }
  </style>
</head>
<body>

  <div class="box">
    <h2>RANKED MODE</h2>
    <p>Entry Fee: <b>0.01 SOL</b></p>
    <p>Unlocks ranked mode for <b>24 hours</b></p>

    <button id="payBtn">CONNECT WALLET & PAY</button>
    <div id="status"></div>

    <br />
    <a href="city.html">Back</a>
  </div>

  <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.js"></script>

  <script>
    const DEST = "8UH2aQubZ5kjR5PpesoPio4zkAfafoMY5hHuKrPYz6ct";
    const LAMPORTS = 10000000; // 0.01 SOL
    const UNLOCK_MS = 24 * 60 * 60 * 1000;

    const MEMO_PROGRAM_ID = new solanaWeb3.PublicKey(
      "MemoSq4gqABAXKb96qnH8TysNcWxMyWCqXgDLGmfcHr"
    );

    const btn = document.getElementById("payBtn");
    const statusEl = document.getElementById("status");

    function setStatus(text) {
      statusEl.textContent = text || "";
    }

    function getProvider() {
      if (window.phantom?.solana) return window.phantom.solana;
      if (window.solana?.isPhantom) return window.solana;
      if (window.solana) return window.solana;
      return null;
    }

    function makeMemo(wallet) {
      return `neon99-ranked:${wallet}:${Date.now()}`;
    }

    function makeMemoInstruction(memo) {
      return new solanaWeb3.TransactionInstruction({
        keys: [],
        programId: MEMO_PROGRAM_ID,
        data: new TextEncoder().encode(memo)
      });
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function isExpiredError(err) {
      const msg = String(err?.message || err || "").toLowerCase();
      return (
        msg.includes("block height exceeded") ||
        msg.includes("expired") ||
        msg.includes("transactionexpiredblockheightexceedederror")
      );
    }

    function readErrorMessage(err) {
      const msg = String(err?.message || err || "");

      if (msg.includes("User rejected")) {
        return "User rejected the request.";
      }

      if (msg.includes("SOLANA_RPC_URL missing")) {
        return "Server RPC missing in Vercel.";
      }

      if (msg.includes("Signature already used")) {
        return "This payment was already processed.";
      }

      return msg || "Payment failed";
    }

    async function verifyWithServer(wallet, signature, memo) {
      const res = await fetch("/api/verify-payment", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          wallet,
          signature,
          memo
        })
      });

      let data = {};
      try {
        data = await res.json();
      } catch (_) {}

      if (!res.ok || !data.ok) {
        throw new Error(data.error || "Payment verification failed");
      }

      return data;
    }

    async function recoverWithServer(signature) {
      const res = await fetch(`/api/recover-payment?sig=${encodeURIComponent(signature)}`, {
        method: "GET"
      });

      let data = {};
      try {
        data = await res.json();
      } catch (_) {}

      if (!res.ok || !data.ok) {
        throw new Error(data.error || "Payment recovery failed");
      }

      return data;
    }

    async function unlockRanked(wallet, passUntil) {
      const finalPassUntil = Number(passUntil || 0) || (Date.now() + UNLOCK_MS);
      localStorage.setItem("neon99_wallet", wallet);
      localStorage.setItem("neon99_pass_until", String(finalPassUntil));
      setStatus("Payment verified. Ranked unlocked.");
      alert("Ranked unlocked for 24 hours");
      location.href = "city.html";
    }

    async function tryNormalVerify(wallet, signature, memo) {
      setStatus("Verifying payment...");
      const verify = await verifyWithServer(wallet, signature, memo);
      await unlockRanked(wallet, verify.pass_until);
    }

    async function tryRecovery(signature) {
      setStatus("Trying payment recovery...");
      const recovery = await recoverWithServer(signature);
      await unlockRanked(recovery.wallet, recovery.pass_until);
    }

    async function pay() {
      btn.disabled = true;

      let wallet = "";
      let memo = "";
      let signature = "";

      try {
        const provider = getProvider();

        if (!provider) {
          setStatus("Phantom wallet not found");
          alert("Open this page inside Phantom wallet browser.");
          return;
        }

        setStatus("Connecting wallet...");
        const connectResult = await provider.connect();
        wallet = (connectResult?.publicKey || provider.publicKey).toString();
        localStorage.setItem("neon99_wallet", wallet);

        const connection = new solanaWeb3.Connection(
          `${location.origin}/api/solana-rpc`,
          "confirmed"
        );

        setStatus("Preparing transaction...");
        memo = makeMemo(wallet);

        const latest = await connection.getLatestBlockhash("confirmed");

        const tx = new solanaWeb3.Transaction().add(
          solanaWeb3.SystemProgram.transfer({
            fromPubkey: provider.publicKey,
            toPubkey: new solanaWeb3.PublicKey(DEST),
            lamports: LAMPORTS
          }),
          makeMemoInstruction(memo)
        );

        tx.feePayer = provider.publicKey;
        tx.recentBlockhash = latest.blockhash;

        setStatus("Waiting for Phantom approval...");
        const sendResult = await provider.signAndSendTransaction(tx);
        signature = typeof sendResult === "string" ? sendResult : sendResult.signature;

        if (!signature) {
          throw new Error("No transaction signature returned");
        }

        try {
          setStatus("Confirming on-chain...");
          await connection.confirmTransaction(
            {
              signature,
              blockhash: latest.blockhash,
              lastValidBlockHeight: latest.lastValidBlockHeight
            },
            "confirmed"
          );
        } catch (confirmErr) {
          if (!isExpiredError(confirmErr)) {
            throw confirmErr;
          }
          setStatus("Confirmation expired, checking payment...");
          await sleep(2500);
        }

        try {
          await tryNormalVerify(wallet, signature, memo);
          return;
        } catch (verifyErr) {
          console.error("verify failed, trying recovery", verifyErr);
        }

        await tryRecovery(signature);

      } catch (e) {
        console.error(e);

        if (signature) {
          try {
            await sleep(1500);
            await tryRecovery(signature);
            return;
          } catch (recoveryErr) {
            console.error("recovery failed", recoveryErr);
          }
        }

        const msg = readErrorMessage(e);
        setStatus("Payment failed");
        alert("Payment failed:\n" + msg);
      } finally {
        btn.disabled = false;
      }
    }

    btn.addEventListener("click", pay);
  </script>

</body>
</html>
