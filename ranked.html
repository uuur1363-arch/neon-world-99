<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ranked Entry</title>
<style>
body{
  background:black;
  color:white;
  font-family:monospace;
  text-align:center;
  margin:0;
  padding:40px 20px;
}
.box{
  max-width:420px;
  margin:80px auto;
  padding:24px;
  border:1px solid rgba(255,255,255,.18);
  border-radius:14px;
}
button{
  padding:14px 22px;
  font-size:16px;
  background:#00d4ff;
  color:black;
  border:none;
  border-radius:10px;
  width:100%;
  font-weight:bold;
}
#status{
  margin-top:14px;
  min-height:30px;
}
</style>
</head>

<body>

<div class="box">

<h2>RANKED MODE</h2>

<p>Entry Fee: <b>0.01 SOL</b></p>
<p>Unlocks ranked mode for <b>24 hours</b></p>

<button id="payBtn">CONNECT WALLET & PAY</button>

<div id="status"></div>

<br>
<a href="city.html" style="color:#888">Back</a>

</div>

<script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.js"></script>

<script>

const DEST="8UH2aQubZ5kjR5PpesoPio4zkAfafoMY5hHuKrPYz6ct"
const LAMPORTS=10000000

const btn=document.getElementById("payBtn")
const status=document.getElementById("status")

function setStatus(t){
status.textContent=t
}

function getProvider(){
if(window.phantom?.solana) return window.phantom.solana
if(window.solana) return window.solana
return null
}

async function pay(){

btn.disabled=true

try{

const provider=getProvider()

if(!provider){
alert("Open inside Phantom wallet browser")
return
}

setStatus("Connecting wallet...")
await provider.connect()

const connection=new solanaWeb3.Connection(
solanaWeb3.clusterApiUrl("mainnet-beta")
)

setStatus("Creating transaction...")

const tx=new solanaWeb3.Transaction().add(

solanaWeb3.SystemProgram.transfer({

fromPubkey:provider.publicKey,
toPubkey:new solanaWeb3.PublicKey(DEST),
lamports:LAMPORTS

})

)

tx.feePayer=provider.publicKey
tx.recentBlockhash=(await connection.getLatestBlockhash()).blockhash

setStatus("Waiting for Phantom approval...")

const {signature}=await provider.signAndSendTransaction(tx)

setStatus("Confirming...")

await connection.confirmTransaction(signature)

setStatus("Payment successful")

const until=Date.now()+86400000

localStorage.setItem("neon99_pass_until",until)

alert("Ranked unlocked for 24 hours")

location.href="city.html"

}catch(e){

console.error(e)
alert("Payment failed:\n"+e.message)
setStatus("Payment failed")

}

btn.disabled=false

}

btn.onclick=pay

</script>

</body>
</html>
