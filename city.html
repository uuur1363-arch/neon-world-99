<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NEON WORLD '99 — CITIES</title>
  <style>
    body{
      margin:0;
      padding:20px 14px 36px;
      background:#000;
      color:#fff;
      font-family:monospace;
    }
    .wrap{
      max-width:900px;
      margin:0 auto;
    }
    h1{
      color:#00d4ff;
      text-align:center;
      margin:8px 0 6px;
    }
    .sub{
      color:rgba(255,255,255,.7);
      text-align:center;
      font-size:13px;
      margin-bottom:18px;
    }
    .top{
      display:flex;
      justify-content:center;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:18px;
    }
    .pill{
      padding:10px 12px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.04);
      font-size:12px;
      color:#fff;
    }
    .grid{
      display:grid;
      grid-template-columns:1fr;
      gap:14px;
    }
    .card{
      position:relative;
      overflow:hidden;
      border-radius:16px;
      min-height:140px;
      border:1px solid rgba(255,255,255,.14);
      background:#111;
      box-shadow:0 0 0 1px rgba(255,255,255,.03) inset;
    }
    .bg{
      position:absolute;
      inset:0;
      background-size:cover;
      background-position:center;
      filter:brightness(.58);
    }
    .overlay{
      position:absolute;
      inset:0;
      background:linear-gradient(to top, rgba(0,0,0,.86), rgba(0,0,0,.18));
    }
    .content{
      position:relative;
      z-index:2;
      padding:16px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      min-height:140px;
    }
    .name{
      font-size:22px;
      font-weight:bold;
      margin-bottom:6px;
    }
    .meta{
      color:rgba(255,255,255,.8);
      font-size:12px;
      line-height:1.5;
    }
    .status{
      display:inline-block;
      margin-top:8px;
      padding:6px 10px;
      border-radius:999px;
      font-size:11px;
      font-weight:bold;
    }
    .unlocked{
      background:rgba(0,212,255,.14);
      color:#00d4ff;
      border:1px solid rgba(0,212,255,.35);
    }
    .locked{
      background:rgba(255,255,255,.08);
      color:rgba(255,255,255,.75);
      border:1px solid rgba(255,255,255,.16);
    }
    .playBtn{
      margin-top:12px;
      width:100%;
      max-width:180px;
      padding:12px 14px;
      border:none;
      border-radius:12px;
      font-family:monospace;
      font-weight:bold;
      background:#00d4ff;
      color:#000;
    }
    .playBtn[disabled]{
      background:rgba(255,255,255,.12);
      color:rgba(255,255,255,.5);
    }
    .actions{
      display:flex;
      justify-content:center;
      gap:10px;
      flex-wrap:wrap;
      margin-top:20px;
    }
    .btn{
      padding:12px 14px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.18);
      background:rgba(255,255,255,.05);
      color:#fff;
      font-family:monospace;
    }

    @media (min-width: 700px){
      .grid{
        grid-template-columns:1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>CHOOSE YOUR CITY</h1>
    <div class="sub">Unlocked cities depend on your best score</div>

    <div class="top">
      <div class="pill">Mode: <b id="modeText">Loading...</b></div>
      <div class="pill">Best Score: <b id="bestText">0</b></div>
      <div class="pill">Wallet: <b id="walletText">guest</b></div>
    </div>

    <div class="grid" id="cityGrid"></div>

    <div class="actions">
      <button class="btn" onclick="goHome()">HOME</button>
      <button class="btn" onclick="goBoard()">LEADERBOARD</button>
    </div>
  </div>

  <script>
    const CITY_LIST = [
      { name: "New York", need: 0, bg: "/bg_ny.jpg", fallback: "/bg_ny.jpg" },
      { name: "Tokyo", need: 10000, bg: "/bg_tokyo.jpg", fallback: "/bg_ny.jpg" },
      { name: "Berlin", need: 25000, bg: "/bg_berlin.jpg", fallback: "/bg_ny.jpg" },
      { name: "Rio", need: 50000, bg: "/bg_rio.jpg", fallback: "/bg_ny.jpg" },
      { name: "Seoul", need: 80000, bg: "/bg_seoul.jpg", fallback: "/bg_tokyo.jpg" },
      { name: "London", need: 120000, bg: "/bg_london.jpg", fallback: "/bg_berlin.jpg" },
      { name: "Paris", need: 170000, bg: "/bg_paris.jpg", fallback: "/bg_london.jpg" },
      { name: "Dubai", need: 230000, bg: "/bg_dubai.jpg", fallback: "/bg_ny.jpg" },
      { name: "Singapore", need: 300000, bg: "/bg_singapore.jpg", fallback: "/bg_dubai.jpg" },
      { name: "Istanbul", need: 380000, bg: "/bg_istanbul.jpg", fallback: "/bg_paris.jpg" }
    ];

    function loadBest() {
      try {
        const v = localStorage.getItem("neon99_best");
        return v ? parseInt(v, 10) : 0;
      } catch {
        return 0;
      }
    }

    function getMode() {
      return localStorage.getItem("neon99_mode") || "free";
    }

    function getWallet() {
      try {
        return localStorage.getItem("neon99_wallet") || "guest";
      } catch {
        return "guest";
      }
    }

    function shortWallet(w) {
      const s = String(w || "");
      if (!s) return "guest";
      if (s.length <= 12) return s;
      return s.slice(0, 4) + "..." + s.slice(-4);
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (m) => {
        return {
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          "\"": "&quot;",
          "'": "&#39;"
        }[m];
      });
    }

    function imageExists(url) {
      return new Promise((resolve) => {
        const img = new Image();
        let done = false;

        const finish = (ok) => {
          if (done) return;
          done = true;
          resolve(ok);
        };

        img.onload = () => finish(true);
        img.onerror = () => finish(false);
        img.src = url;

        setTimeout(() => finish(false), 1200);
      });
    }

    async function getBg(url, fallback) {
      const ok = await imageExists(url);
      return ok ? url : fallback;
    }

    async function renderCities() {
      const best = loadBest();
      const mode = getMode();
      const wallet = getWallet();

      document.getElementById("modeText").textContent = mode.toUpperCase();
      document.getElementById("bestText").textContent = String(best);
      document.getElementById("walletText").textContent = shortWallet(wallet);

      const grid = document.getElementById("cityGrid");
      grid.innerHTML = "";

      for (const city of CITY_LIST) {
        const unlocked = best >= city.need;
        const bg = await getBg(city.bg, city.fallback);

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
          <div class="bg" style="background-image:url('${bg}')"></div>
          <div class="overlay"></div>
          <div class="content">
            <div>
              <div class="name">${escapeHtml(city.name)}</div>
              <div class="meta">
                Unlock score: <b>${city.need}</b><br>
                ${unlocked ? "Ready to play" : `Need ${city.need - best} more score`}
              </div>
              <div class="status ${unlocked ? "unlocked" : "locked"}">
                ${unlocked ? "UNLOCKED" : "LOCKED"}
              </div>
            </div>
            <div>
              <button class="playBtn" ${unlocked ? "" : "disabled"} data-city="${escapeHtml(city.name)}">
                ${unlocked ? "PLAY CITY" : "LOCKED"}
              </button>
            </div>
          </div>
        `;

        grid.appendChild(card);
      }

      grid.querySelectorAll(".playBtn").forEach((btn) => {
        btn.onclick = () => {
          const cityName = btn.getAttribute("data-city");
          if (!btn.disabled) {
            window.city(cityName);
          }
        };
      });
    }

    renderCities();
  </script>

  <script src="game.js"></script>
</body>
</html>
