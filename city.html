<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NEON WORLD '99 — CITIES</title>
<style>
body{
margin:0;
padding:20px;
background:black;
color:white;
font-family:monospace;
}

h1{
text-align:center;
color:#00d4ff;
}

.grid{
display:grid;
gap:14px;
max-width:520px;
margin:auto;
}

.card{
border:1px solid rgba(255,255,255,.2);
border-radius:12px;
padding:16px;
background:rgba(255,255,255,.05);
}

.city{
font-size:20px;
margin-bottom:6px;
}

.meta{
font-size:12px;
color:#aaa;
margin-bottom:8px;
line-height:1.45;
}

button{
padding:10px;
border:none;
border-radius:8px;
background:#00d4ff;
color:black;
font-family:monospace;
font-weight:bold;
width:100%;
}

button[disabled]{
background:#333;
color:#888;
}

.status{
font-size:11px;
margin-bottom:8px;
}

.top{
text-align:center;
margin-bottom:20px;
font-size:12px;
color:#aaa;
}
</style>
</head>
<body>

<h1>CHOOSE CITY</h1>

<div class="top">
MODE: <span id="mode"></span>
&nbsp;&nbsp;
BEST: <span id="best"></span>
</div>

<div class="grid" id="grid"></div>

<script>
const CITY_ORDER = [
  "New York",
  "Tokyo",
  "Berlin",
  "Rio",
  "Seoul",
  "London",
  "Paris",
  "Dubai",
  "Singapore",
  "Istanbul"
];

const CITY_REQUIRE = {
  "New York":0,
  "Tokyo":500,
  "Berlin":700,
  "Rio":900,
  "Seoul":1100,
  "London":1300,
  "Paris":1500,
  "Dubai":1800,
  "Singapore":2100,
  "Istanbul":2500
};

function loadBest() {
  const v = localStorage.getItem("neon99_best");
  return v ? parseInt(v, 10) : 0;
}

function loadCityScores() {
  try {
    const j = localStorage.getItem("neon99_city_scores");
    return j ? JSON.parse(j) : {};
  } catch {
    return {};
  }
}

function getCityScore(city) {
  const data = loadCityScores();
  return data[city] || 0;
}

function cityUnlocked(city) {
  if (city === "New York") return true;

  const index = CITY_ORDER.indexOf(city);
  const prev = CITY_ORDER[index - 1];
  const prevScore = getCityScore(prev);

  return prevScore >= CITY_REQUIRE[city];
}

function getMode() {
  return localStorage.getItem("neon99_mode") || "free";
}

function playCity(name) {
  localStorage.setItem("neon99_city", name);
  location.href = "/index.html";
}

function render() {
  document.getElementById("mode").textContent = getMode().toUpperCase();
  document.getElementById("best").textContent = loadBest();

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  CITY_ORDER.forEach((city) => {
    const unlocked = cityUnlocked(city);
    const score = getCityScore(city);

    const card = document.createElement("div");
    card.className = "card";

    const index = CITY_ORDER.indexOf(city);
    const prev = index > 0 ? CITY_ORDER[index - 1] : null;

    card.innerHTML = `
      <div class="city">${city}</div>

      <div class="meta">
        CITY SCORE: ${score}<br>
        ${city === "New York"
          ? "START CITY"
          : `UNLOCK: ${prev} → ${CITY_REQUIRE[city]}`}
      </div>

      <div class="status">
        ${unlocked ? "UNLOCKED" : "LOCKED"}
      </div>

      <button ${unlocked ? "" : "disabled"} onclick="playCity('${city}')">
        ${unlocked ? "PLAY" : "LOCKED"}
      </button>
    `;

    grid.appendChild(card);
  });
}

render();
window.addEventListener("pageshow", render);
window.addEventListener("focus", render);
</script>

</body>
</html>
