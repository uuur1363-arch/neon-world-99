<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NEON WORLD '99 — CITIES</title>

<style>

body{
margin:0;
padding:20px;
background:black;
color:white;
font-family:monospace;
}

h1{
text-align:center;
color:#00d4ff;
}

.grid{
display:grid;
grid-template-columns:1fr;
gap:12px;
max-width:600px;
margin:auto;
}

.card{
border:1px solid rgba(255,255,255,.2);
border-radius:14px;
padding:16px;
background:rgba(255,255,255,.05);
}

.city{
font-size:20px;
font-weight:bold;
margin-bottom:6px;
}

.meta{
font-size:12px;
color:#aaa;
margin-bottom:10px;
}

.status{
font-size:11px;
padding:6px 10px;
border-radius:20px;
display:inline-block;
margin-bottom:8px;
}

.unlocked{
background:#00d4ff22;
color:#00d4ff;
border:1px solid #00d4ff66;
}

.locked{
background:#ffffff11;
color:#aaa;
border:1px solid #ffffff22;
}

button{
padding:10px 14px;
border-radius:10px;
border:none;
font-family:monospace;
font-weight:bold;
background:#00d4ff;
color:black;
}

button[disabled]{
background:#444;
color:#aaa;
}

.top{
text-align:center;
margin-bottom:20px;
font-size:12px;
color:#aaa;
}

</style>

</head>

<body>

<h1>CHOOSE CITY</h1>

<div class="top">
MODE: <b id="mode"></b>
&nbsp;&nbsp;
BEST: <b id="best"></b>
</div>

<div class="grid" id="grid"></div>

<script src="game.js"></script>

<script>

// cities
const CITY_ORDER=[
"New York",
"Tokyo",
"Berlin",
"Rio",
"Seoul",
"London",
"Paris",
"Dubai",
"Singapore",
"Istanbul"
]

// unlock scores
const CITY_REQUIRE={
"New York":0,
"Tokyo":500,
"Berlin":700,
"Rio":900,
"Seoul":1100,
"London":1300,
"Paris":1500,
"Dubai":1800,
"Singapore":2100,
"Istanbul":2500
}

// storage
function loadBest(){
const v=localStorage.getItem("neon99_best")
return v?parseInt(v,10):0
}

function loadCityScores(){
try{
const j=localStorage.getItem("neon99_city_scores")
return j?JSON.parse(j):{}
}catch{
return{}
}
}

function getCityScore(city){
const data=loadCityScores()
return data[city]||0
}

function cityUnlocked(city){

if(city==="New York") return true

const index=CITY_ORDER.indexOf(city)

const prev=CITY_ORDER[index-1]

const prevScore=getCityScore(prev)

return prevScore>=CITY_REQUIRE[city]

}

function getMode(){
return localStorage.getItem("neon99_mode")||"free"
}

function render(){

document.getElementById("mode").textContent=getMode()

const best=loadBest()

document.getElementById("best").textContent=best

const grid=document.getElementById("grid")

grid.innerHTML=""

CITY_ORDER.forEach(city=>{

const unlocked=cityUnlocked(city)

const score=getCityScore(city)

const card=document.createElement("div")

card.className="card"

card.innerHTML=`

<div class="city">${city}</div>

<div class="meta">
CITY SCORE: ${score}
<br>
UNLOCK NEED: ${CITY_REQUIRE[city]}
</div>

<div class="status ${unlocked?"unlocked":"locked"}">
${unlocked?"UNLOCKED":"LOCKED"}
</div>

<br>

<button ${unlocked?"":"disabled"} onclick="city('${city}')">
${unlocked?"PLAY":"LOCKED"}
</button>

`

grid.appendChild(card)

})

}

// refresh
render()

// safari cache fix
window.addEventListener("pageshow",render)

</script>

</body>
</html>
