<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>NEON WORLD '99 — CITIES</title>
  <style>
    body{
      margin:0;
      padding:20px 16px 32px;
      background:
        radial-gradient(circle at top, rgba(0,212,255,.08), transparent 30%),
        radial-gradient(circle at bottom, rgba(255,45,107,.06), transparent 30%),
        #000;
      color:#fff;
      font-family:monospace;
      -webkit-user-select:none;
      user-select:none;
      -webkit-touch-callout:none;
    }

    h1{
      text-align:center;
      color:#00d4ff;
      margin:8px 0 8px;
      text-shadow:0 0 10px rgba(0,212,255,.22);
    }

    .top{
      text-align:center;
      margin-bottom:16px;
      font-size:12px;
      color:#aaa;
      line-height:1.8;
    }

    .accent{
      color:#00d4ff;
    }

    .rank{
      color:#ffd166;
      font-weight:bold;
    }

    .actions{
      display:flex;
      justify-content:center;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:18px;
    }

    .smallBtn{
      padding:10px 14px;
      border:none;
      border-radius:10px;
      background:#1a1a1a;
      color:#ddd;
      border:1px solid #444;
      font-family:monospace;
      -webkit-tap-highlight-color:transparent;
    }

    .grid{
      display:grid;
      gap:14px;
      max-width:560px;
      margin:auto;
    }

    .card{
      border:1px solid rgba(255,255,255,.18);
      border-radius:14px;
      padding:16px;
      background:rgba(255,255,255,.05);
      box-shadow:0 0 0 1px rgba(255,255,255,.03) inset;
    }

    .cityRow{
      display:flex;
      align-items:center;
      gap:8px;
      margin-bottom:6px;
      flex-wrap:wrap;
    }

    .city{
      font-size:20px;
      color:#fff;
    }

    .flag{
      width:20px;
      height:14px;
      object-fit:cover;
      border-radius:2px;
      border:1px solid rgba(255,255,255,.22);
      background:#111;
      flex:0 0 auto;
    }

    .meta{
      font-size:12px;
      color:#aaa;
      margin-bottom:10px;
      line-height:1.65;
    }

    .status{
      font-size:11px;
      margin-bottom:10px;
      font-weight:bold;
      letter-spacing:.4px;
    }

    .status.unlocked{
      color:#00d4ff;
    }

    .status.locked{
      color:#999;
    }

    .progress{
      color:#ffd166;
    }

    button.play{
      padding:11px;
      border:none;
      border-radius:10px;
      background:#00d4ff;
      color:#000;
      font-family:monospace;
      font-weight:bold;
      width:100%;
      -webkit-tap-highlight-color:transparent;
    }

    button.play[disabled]{
      background:#333;
      color:#888;
    }
  </style>
</head>
<body>

  <h1>CHOOSE CITY</h1>

  <div class="top">
    MODE: <span id="mode" class="accent"></span>
    &nbsp;&nbsp;|&nbsp;&nbsp;
    RANK: <span id="rank" class="rank"></span><br>
    OPEN CITIES: <span id="openCount" class="accent"></span> / 10
  </div>

  <div class="actions">
    <button class="smallBtn" onclick="goBack()">BACK</button>
    <button class="smallBtn" onclick="goHome()">HOME</button>
    <button class="smallBtn" onclick="goBoard()">LEADERBOARD</button>
  </div>

  <div class="grid" id="grid"></div>

  <script>
    const CITY_ORDER = [
      "New York",
      "Tokyo",
      "Berlin",
      "Rio",
      "Seoul",
      "London",
      "Paris",
      "Dubai",
      "Singapore",
      "Istanbul"
    ];

    const CITY_REQUIRE = {
      "New York": 0,
      "Tokyo": 1500,
      "Berlin": 2500,
      "Rio": 4000,
      "Seoul": 6000,
      "London": 8500,
      "Paris": 11000,
      "Dubai": 14000,
      "Singapore": 18000,
      "Istanbul": 23000
    };

    const CITY_COUNTRY = {
      "New York": "us",
      "Tokyo": "jp",
      "Berlin": "de",
      "Rio": "br",
      "Seoul": "kr",
      "London": "gb",
      "Paris": "fr",
      "Dubai": "ae",
      "Singapore": "sg",
      "Istanbul": "tr"
    };

    function loadCityScores() {
      try {
        const j = localStorage.getItem("neon99_city_scores");
        return j ? JSON.parse(j) : {};
      } catch {
        return {};
      }
    }

    function getCityScore(city) {
      const data = loadCityScores();
      return Number(data[city] || 0);
    }

    function cityUnlocked(city) {
      if (city === "New York") return true;

      const index = CITY_ORDER.indexOf(city);
      const prev = CITY_ORDER[index - 1];
      const prevScore = getCityScore(prev);

      return prevScore >= CITY_REQUIRE[city];
    }

    function getMode() {
      return localStorage.getItem("neon99_mode") || "free";
    }

    function flagUrl(country) {
      if (!country) return "/flag_us.PNG";
      return "/flag_" + String(country).toLowerCase() + ".PNG";
    }

    function flagImg(country, alt) {
      return `<img class="flag" src="${flagUrl(country)}" alt="${alt || country || 'flag'}" onerror="this.style.display='none'">`;
    }

    function playCity(name) {
      localStorage.setItem("neon99_city", name);
      location.href = "/game.html";
    }

    function goBack() {
      if (history.length > 1) {
        history.back();
      } else {
        location.href = "/index.html";
      }
    }

    function goHome() {
      location.href = "/index.html";
    }

    function goBoard() {
      location.href = "/board.html";
    }

    function getOpenCityCount() {
      let count = 0;
      for (const city of CITY_ORDER) {
        if (cityUnlocked(city)) count++;
      }
      return count;
    }

    function getTotalPersonalBest() {
      const data = loadCityScores();
      let total = 0;
      for (const city of CITY_ORDER) {
        total += Number(data[city] || 0);
      }
      return total;
    }

    function getRankLabel() {
      const total = getTotalPersonalBest();

      if (total >= 80000) return "NEON LEGEND";
      if (total >= 50000) return "DIAMOND";
      if (total >= 28000) return "PLATINUM";
      if (total >= 14000) return "GOLD";
      if (total >= 6000) return "SILVER";
      return "BRONZE";
    }

    function render() {
      document.getElementById("mode").textContent = getMode().toUpperCase();
      document.getElementById("rank").textContent = getRankLabel();
      document.getElementById("openCount").textContent = String(getOpenCityCount());

      const grid = document.getElementById("grid");
      grid.innerHTML = "";

      CITY_ORDER.forEach((city) => {
        const unlocked = cityUnlocked(city);
        const score = getCityScore(city);
        const country = CITY_COUNTRY[city];

        const card = document.createElement("div");
        card.className = "card";

        const index = CITY_ORDER.indexOf(city);
        const prev = index > 0 ? CITY_ORDER[index - 1] : null;
        const prevBest = prev ? getCityScore(prev) : 0;
        const required = CITY_REQUIRE[city];
        const remaining = Math.max(0, required - prevBest);

        card.innerHTML = `
          <div class="cityRow">
            ${flagImg(country, country)}
            <div class="city">${city}</div>
          </div>

          <div class="meta">
            YOUR BEST HERE: ${score}<br>
            ${
              city === "New York"
                ? "START CITY"
                : `REQUIRED IN ${prev}: ${required}`
            }
            ${
              city === "New York"
                ? ""
                : `<br>CURRENT ${prev} BEST: ${prevBest}`
            }
            ${
              city === "New York"
                ? ""
                : `<br><span class="progress">LEFT TO UNLOCK: ${remaining}</span>`
            }
          </div>

          <div class="status ${unlocked ? "unlocked" : "locked"}">
            ${unlocked ? "UNLOCKED" : "LOCKED"}
          </div>

          <button class="play" ${unlocked ? "" : "disabled"} onclick="playCity('${city}')">
            ${unlocked ? "PLAY" : "LOCKED"}
          </button>
        `;

        grid.appendChild(card);
      });
    }

    render();
    window.addEventListener("pageshow", render);
    window.addEventListener("focus", render);
  </script>

</body>
</html>
