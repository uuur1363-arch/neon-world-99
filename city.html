<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Select City</title>

<style>

body{
background:black;
margin:0;
font-family:monospace;
color:white;
text-align:center;
}

h2{
margin-top:20px;
color:#00d4ff;
}

#map{
position:relative;
max-width:900px;
margin:auto;
}

#map img{
width:100%;
display:block;
}

.city{
position:absolute;
cursor:pointer;
text-align:center;
transform:translate(-50%,-50%);
}

.pin{
width:40px;
height:40px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
border:1px solid rgba(0,212,255,.4);
background:rgba(0,0,0,.3);
box-shadow:0 0 10px rgba(0,212,255,.4);
animation:pulse 1.5s infinite;
}

.pin img{
width:26px;
height:26px;
}

.label{
font-size:12px;
margin-top:4px;
}

.locked{
opacity:0.4;
filter:grayscale(1);
animation:none;
}

.lock{
position:absolute;
top:-8px;
right:-8px;
font-size:12px;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.15)}
100%{transform:scale(1)}
}

.zoom{
transition:transform .6s;
transform:translate(-50%,-50%) scale(2.5);
z-index:1000;
}

</style>

</head>

<body>

<h2>SELECT CITY</h2>

<div id="map">

<img src="worldmap.PNG">

<div class="city" style="top:40%;left:20%" data-score="0" onclick="pickCity(this,'New York')">
<div class="pin"><img src="flag_us.PNG"></div>
<div class="label">New York</div>
</div>

<div class="city" style="top:45%;left:80%" data-score="10000" onclick="pickCity(this,'Tokyo')">
<div class="pin"><img src="flag_jp.PNG"></div>
<div class="label">Tokyo</div>
</div>

<div class="city" style="top:42%;left:52%" data-score="25000" onclick="pickCity(this,'Berlin')">
<div class="pin"><img src="flag_de.PNG"></div>
<div class="label">Berlin</div>
</div>

<div class="city" style="top:60%;left:30%" data-score="50000" onclick="pickCity(this,'Rio')">
<div class="pin"><img src="flag_br.PNG"></div>
<div class="label">Rio</div>
</div>

<div class="city" style="top:50%;left:75%" data-score="80000" onclick="pickCity(this,'Seoul')">
<div class="pin"><img src="flag_kr.PNG"></div>
<div class="label">Seoul</div>
</div>

<div class="city" style="top:38%;left:48%" data-score="120000" onclick="pickCity(this,'London')">
<div class="pin"><img src="flag_gb.PNG"></div>
<div class="label">London</div>
</div>

<div class="city" style="top:45%;left:50%" data-score="170000" onclick="pickCity(this,'Paris')">
<div class="pin"><img src="flag_fr.PNG"></div>
<div class="label">Paris</div>
</div>

<div class="city" style="top:48%;left:60%" data-score="230000" onclick="pickCity(this,'Dubai')">
<div class="pin"><img src="flag_ae.PNG"></div>
<div class="label">Dubai</div>
</div>

<div class="city" style="top:55%;left:70%" data-score="300000" onclick="pickCity(this,'Singapore')">
<div class="pin"><img src="flag_sg.PNG"></div>
<div class="label">Singapore</div>
</div>

<div class="city" style="top:45%;left:55%" data-score="380000" onclick="pickCity(this,'Istanbul')">
<div class="pin"><img src="flag_tr.PNG"></div>
<div class="label">Istanbul</div>
</div>

</div>

<script src="game.js"></script>

<script>

function loadBest(){
return parseInt(localStorage.getItem("neon99_best")||0)
}

let best = loadBest()

document.querySelectorAll(".city").forEach(c=>{

let need=parseInt(c.dataset.score)

if(best < need){

c.classList.add("locked")

let l=document.createElement("div")
l.className="lock"
l.innerHTML="🔒"

c.appendChild(l)

}

})

function pickCity(el,name){

let need=parseInt(el.dataset.score)

if(best < need){

alert("LOCKED\nNeed score: "+need)

return

}

el.classList.add("zoom")

setTimeout(()=>{

city(name)

},600)

}

</script>

</body>

</html>
