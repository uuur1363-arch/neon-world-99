<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Choose City</title>

<style>

body{
background:black;
margin:0;
font-family:monospace;
color:white;
text-align:center;
}

#map{
position:relative;
max-width:900px;
margin:auto;
}

#map img{
width:100%;
}

.city{
position:absolute;
cursor:pointer;
text-align:center;
}

.city img{
width:32px;
display:block;
margin:auto;
}

.city span{
font-size:12px;
}

</style>

</head>

<body>

<h2>SELECT CITY</h2>

<div id="map">

<img src="worldmap.png">

<div class="city" style="top:40%;left:20%" onclick="city('New York')">
<img src="flag_us.png"><span>New York</span>
</div>

<div class="city" style="top:45%;left:80%" onclick="city('Tokyo')">
<img src="flag_jp.png"><span>Tokyo</span>
</div>

<div class="city" style="top:42%;left:52%" onclick="city('Berlin')">
<img src="flag_de.png"><span>Berlin</span>
</div>

<div class="city" style="top:60%;left:30%" onclick="city('Rio')">
<img src="flag_br.png"><span>Rio</span>
</div>

<div class="city" style="top:50%;left:75%" onclick="city('Seoul')">
<img src="flag_kr.png"><span>Seoul</span>
</div>

<div class="city" style="top:38%;left:48%" onclick="city('London')">
<img src="flag_gb.png"><span>London</span>
</div>

<div class="city" style="top:45%;left:50%" onclick="city('Paris')">
<img src="flag_fr.png"><span>Paris</span>
</div>

<div class="city" style="top:48%;left:60%" onclick="city('Dubai')">
<img src="flag_ae.png"><span>Dubai</span>
</div>

<div class="city" style="top:55%;left:70%" onclick="city('Singapore')">
<img src="flag_sg.png"><span>Singapore</span>
</div>

<div class="city" style="top:75%;left:85%" onclick="city('Sydney')">
<img src="flag_au.png"><span>Sydney</span>
</div>

</div>

<script src="game.js"></script>

</body>
</html>
