<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>POST TEST</title>
</head>
<body style="background:#000;color:#fff;font-family:monospace;padding:16px">
  <h3>Submit Score Test</h3>

  <div>Wallet</div>
  <input id="w" style="width:100%;padding:10px" value="testwallet123" />

  <div style="margin-top:10px">Score</div>
  <input id="s" style="width:100%;padding:10px" value="1234" />

  <button id="btn" style="margin-top:14px;padding:12px;width:100%">SEND</button>

  <pre id="out" style="white-space:pre-wrap;margin-top:14px"></pre>

<script>
document.getElementById("btn").onclick = async () => {
  const wallet = document.getElementById("w").value;
  const score = Number(document.getElementById("s").value);

  const r = await fetch("/api/submit-score", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ wallet, score })
  });

  const j = await r.json();
  document.getElementById("out").textContent = JSON.stringify(j, null, 2);
};
</script>
</body>
</html>
