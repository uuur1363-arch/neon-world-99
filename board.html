<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta charset="UTF-8">
  <title>NEON WORLD '99 — LEADERBOARD</title>
  <style>
    body{
      margin:0;
      padding:24px 16px 36px;
      background:
        radial-gradient(circle at top, rgba(0,212,255,.08), transparent 35%),
        radial-gradient(circle at bottom, rgba(255,45,107,.06), transparent 35%),
        #000;
      color:#fff;
      font-family:monospace;
      text-align:center;
      -webkit-user-select:none;
      user-select:none;
      -webkit-touch-callout:none;
    }

    h1{
      color:#00d4ff;
      margin:8px 0 8px;
      text-shadow:0 0 10px rgba(0,212,255,.22);
    }

    .sub{
      color:rgba(255,255,255,.72);
      font-size:12px;
      max-width:430px;
      margin:0 auto 18px;
      line-height:1.55;
    }

    .actions{
      display:flex;
      justify-content:center;
      gap:10px;
      flex-wrap:wrap;
      margin:8px auto 18px;
      max-width:560px;
    }

    .smallBtn{
      flex:1 1 120px;
      max-width:180px;
      padding:11px 12px;
      border:none;
      border-radius:10px;
      background:#1a1a1a;
      color:#ddd;
      border:1px solid #444;
      font-family:monospace;
      -webkit-tap-highlight-color:transparent;
    }

    .panel{
      margin:0 auto 14px;
      max-width:560px;
      border:1px solid rgba(255,255,255,.16);
      border-radius:14px;
      padding:16px;
      background:rgba(255,255,255,.04);
      box-shadow:0 0 0 1px rgba(255,255,255,.03) inset;
    }

    .label{
      font-size:12px;
      color:#aaa;
      margin-bottom:6px;
    }

    .big{
      font-size:22px;
      color:#fff;
      margin-bottom:6px;
    }

    .muted{
      font-size:12px;
      color:#888;
      line-height:1.5;
    }

    .tabs{
      display:flex;
      gap:10px;
      justify-content:center;
      flex-wrap:wrap;
      max-width:560px;
      margin:0 auto 12px;
    }

    .subtabs{
      display:flex;
      gap:10px;
      justify-content:center;
      flex-wrap:wrap;
      max-width:560px;
      margin:0 auto 16px;
    }

    .tabBtn{
      padding:10px 14px;
      border:none;
      border-radius:10px;
      background:#111;
      color:#ddd;
      border:1px solid #333;
      font-family:monospace;
    }

    .tabBtn.active{
      background:#00d4ff;
      color:#000;
      border-color:#00d4ff;
      font-weight:bold;
    }

    .list{
      max-width:560px;
      margin:0 auto;
      display:grid;
      gap:12px;
    }

    .row{
      display:grid;
      grid-template-columns:56px 1fr auto;
      align-items:center;
      gap:10px;
      text-align:left;
      border:1px solid rgba(255,255,255,.14);
      border-radius:14px;
      padding:14px 12px;
      background:rgba(255,255,255,.04);
    }

    .rank{
      font-size:22px;
      color:#a8ff3e;
      text-align:center;
      font-weight:bold;
    }

    .rank.top1{
      color:#ffd166;
    }

    .who{
      min-width:0;
    }

    .wallet{
      font-size:16px;
      color:#fff;
      margin-bottom:4px;
      word-break:break-word;
    }

    .meta{
      font-size:12px;
      color:#aaa;
      line-height:1.45;
      display:flex;
      align-items:center;
      gap:6px;
      flex-wrap:wrap;
    }

    .score{
      text-align:right;
    }

    .pts{
      font-size:22px;
      color:#ff2d6b;
      font-weight:bold;
      line-height:1;
    }

    .mode{
      font-size:11px;
      color:#00d4ff;
      margin-top:5px;
      text-transform:uppercase;
    }

    .flag{
      width:20px;
      height:14px;
      object-fit:cover;
      border-radius:2px;
      border:1px solid rgba(255,255,255,.22);
      background:#111;
      flex:0 0 auto;
    }

    .empty{
      max-width:560px;
      margin:0 auto;
      padding:18px;
      border:1px solid rgba(255,255,255,.14);
      border-radius:14px;
      background:rgba(255,255,255,.04);
      color:#aaa;
      font-size:13px;
      line-height:1.6;
    }
  </style>
</head>
<body>

  <h1>LEADERBOARD</h1>
  <div class="sub">
    Climb the rankings, represent your country, your city, and chase the weekly jackpot in Neon World '99.
  </div>

  <div class="actions">
    <button class="smallBtn" onclick="goBack()">BACK</button>
    <button class="smallBtn" onclick="location.href='/index.html'">HOME</button>
    <button class="smallBtn" onclick="location.href='/city.html'">CITIES</button>
    <button class="smallBtn" onclick="location.href='/ranked.html'">RANKED</button>
  </div>

  <div class="panel">
    <div class="label">CURRENT WEEKLY JACKPOT</div>
    <div class="big" id="jackpotText">Loading...</div>
    <div class="muted" id="jackpotMeta">Loading ranked stats...</div>
  </div>

  <div class="tabs">
    <button id="globalTab" class="tabBtn active" onclick="setBoardType('global')">GLOBAL</button>
    <button id="countryTab" class="tabBtn" onclick="setBoardType('country')">COUNTRY</button>
    <button id="cityTab" class="tabBtn" onclick="setBoardType('city')">CITY</button>
  </div>

  <div id="scopeTabs" class="subtabs">
    <button id="weekTab" class="tabBtn active" onclick="setScope('week')">THIS WEEK</button>
    <button id="allTab" class="tabBtn" onclick="setScope('all')">ALL TIME</button>
  </div>

  <div id="list" class="list"></div>
  <div id="empty" class="empty" style="display:none;">No leaderboard entries yet.</div>

  <script>
    let currentBoardType = "global";
    let currentScope = "week";

    function goBack() {
      if (history.length > 1) {
        history.back();
      } else {
        location.href = "/index.html";
      }
    }

    function shortWallet(w) {
      const s = String(w || "");
      if (!s) return "N/A";
      if (s.length <= 14) return s;
      return s.slice(0, 4) + "..." + s.slice(-4);
    }

    function escapeHtml(s) {
      return String(s || "").replace(/[&<>"']/g, (m) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[m]));
    }

    function flagUrl(country) {
      if (!country || country === "unknown") return "/flag_us.PNG";
      return "/flag_" + String(country).toLowerCase() + ".PNG";
    }

    function flagImg(country, alt) {
      const src = flagUrl(country);
      const label = alt || country || "flag";
      return `<img class="flag" src="${src}" alt="${escapeHtml(label)}" onerror="this.style.display='none'">`;
    }

    function setBoardType(type) {
      currentBoardType = type;

      document.getElementById("globalTab").classList.toggle("active", type === "global");
      document.getElementById("countryTab").classList.toggle("active", type === "country");
      document.getElementById("cityTab").classList.toggle("active", type === "city");

      const scopeTabs = document.getElementById("scopeTabs");
      scopeTabs.style.display = type === "global" ? "flex" : "none";

      loadBoard();
    }

    function setScope(scope) {
      currentScope = scope;
      document.getElementById("weekTab").classList.toggle("active", scope === "week");
      document.getElementById("allTab").classList.toggle("active", scope === "all");
      loadBoard();
    }

    async function loadJackpot() {
      try {
        const r = await fetch("/api/weekly-winner");
        const j = await r.json();

        if (!r.ok || !j.ok) {
          document.getElementById("jackpotText").textContent = "Unavailable";
          document.getElementById("jackpotMeta").textContent = "Could not load weekly stats";
          return;
        }

        document.getElementById("jackpotText").textContent =
          `${Number(j.jackpot_sol || 0).toFixed(3)} SOL`;

        const leaderFlag = j.leader_country ? flagImg(j.leader_country, j.leader_country) + " " : "";
        const leaderWallet = j.leader_wallet ? shortWallet(j.leader_wallet) : "No leader yet";
        const leaderScore = Number(j.leader_score || 0);

        document.getElementById("jackpotMeta").innerHTML =
          `${Number(j.entry_count || 0)} ranked entries • ${escapeHtml(String(j.week_key || ""))}<br>` +
          `Leader: ${leaderFlag}${escapeHtml(leaderWallet)} • ${leaderScore} pts`;
      } catch {
        document.getElementById("jackpotText").textContent = "Unavailable";
        document.getElementById("jackpotMeta").textContent = "Could not load weekly stats";
      }
    }

    function renderGlobal(items) {
      const list = document.getElementById("list");
      list.innerHTML = "";

      items.forEach((item, idx) => {
        const row = document.createElement("div");
        row.className = "row";

        const rankClass = idx === 0 ? "rank top1" : "rank";
        const wallet = shortWallet(item.wallet);
        const score = Number(item.score || 0);
        const city = item.city || "Unknown";
        const country = item.country || "";
        const mode = item.mode || "ranked";

        row.innerHTML = `
          <div class="${rankClass}">#${Number(item.rank || idx + 1)}</div>

          <div class="who">
            <div class="wallet">${escapeHtml(wallet)}</div>
            <div class="meta">
              ${flagImg(country, country)}
              <span>${escapeHtml(country || "—")}</span>
              <span>•</span>
              <span>${escapeHtml(city)}</span>
            </div>
          </div>

          <div class="score">
            <div class="pts">${score}</div>
            <div class="mode">${escapeHtml(mode)}</div>
          </div>
        `;

        list.appendChild(row);
      });
    }

    function renderCountry(items) {
      const list = document.getElementById("list");
      list.innerHTML = "";

      items.forEach((item, idx) => {
        const row = document.createElement("div");
        row.className = "row";

        const rankClass = idx === 0 ? "rank top1" : "rank";
        const country = item.country || "unknown";
        const score = Number(item.score || 0);

        row.innerHTML = `
          <div class="${rankClass}">#${Number(item.rank || idx + 1)}</div>

          <div class="who">
            <div class="wallet">${flagImg(country, country)} ${escapeHtml(country)}</div>
            <div class="meta">
              <span>Country power ranking</span>
            </div>
          </div>

          <div class="score">
            <div class="pts">${score}</div>
            <div class="mode">country</div>
          </div>
        `;

        list.appendChild(row);
      });
    }

    function renderCity(items) {
      const list = document.getElementById("list");
      list.innerHTML = "";

      items.forEach((item, idx) => {
        const row = document.createElement("div");
        row.className = "row";

        const rankClass = idx === 0 ? "rank top1" : "rank";
        const city = item.city || "unknown";
        const score = Number(item.score || 0);

        row.innerHTML = `
          <div class="${rankClass}">#${Number(item.rank || idx + 1)}</div>

          <div class="who">
            <div class="wallet">${escapeHtml(city)}</div>
            <div class="meta">
              <span>City power ranking</span>
            </div>
          </div>

          <div class="score">
            <div class="pts">${score}</div>
            <div class="mode">city</div>
          </div>
        `;

        list.appendChild(row);
      });
    }

    async function loadBoard() {
      const list = document.getElementById("list");
      const empty = document.getElementById("empty");

      try {
        let url = "";

        if (currentBoardType === "global") {
          url = `/api/leaderboards?type=global&scope=${encodeURIComponent(currentScope)}`;
        } else if (currentBoardType === "country") {
          url = `/api/leaderboards?type=country&scope=all`;
        } else {
          url = `/api/leaderboards?type=city&scope=all`;
        }

        const r = await fetch(url);
        const j = await r.json();

        if (!r.ok || !j.ok || !Array.isArray(j.items)) {
          list.innerHTML = "";
          empty.style.display = "block";
          return;
        }

        if (j.items.length === 0) {
          list.innerHTML = "";
          empty.style.display = "block";
          return;
        }

        empty.style.display = "none";

        if (currentBoardType === "global") {
          renderGlobal(j.items);
        } else if (currentBoardType === "country") {
          renderCountry(j.items);
        } else {
          renderCity(j.items);
        }
      } catch {
        list.innerHTML = "";
        empty.style.display = "block";
      }
    }

    async function init() {
      await loadJackpot();
      await loadBoard();
    }

    init();
  </script>

</body>
</html>
