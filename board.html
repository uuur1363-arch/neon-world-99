<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Leaderboard</title>
</head>

<body style="background:black;color:white;font-family:monospace">

<h2>🌍 COUNTRY WAR</h2>
<div id="countries">Loading...</div>

<br><br>

<h2>🏆 GLOBAL PLAYERS</h2>
<div id="players">Loading...</div>

<script>

function flagEmoji(cc){
  if(!cc) return "🏳️";
  const s = cc.toUpperCase();
  const A = 0x1F1E6;
  const code = c => A + (c.charCodeAt(0)-65);
  if(s.length!==2) return "🏳️";
  return String.fromCodePoint(code(s[0]),code(s[1]));
}

async function load(){

const r = await fetch("/api/score");
const j = await r.json();

if(!j.ok){
document.body.innerHTML="error";
return;
}

// ----- country totals -----
let chtml="";

(j.countries || []).forEach((c,i)=>{

chtml+=`
<div style="display:flex;justify-content:space-between;padding:6px 0">
<div>#${i+1} ${flagEmoji(c.country)} ${c.country}</div>
<div>${c.score}</div>
</div>
`;

});

document.getElementById("countries").innerHTML=chtml;


// ----- players -----
let phtml="";

(j.top || []).forEach((u,i)=>{

let w=u.wallet.slice(0,6)+"..."+u.wallet.slice(-4);

phtml+=`
<div style="display:flex;justify-content:space-between;padding:6px 0">
<div>#${i+1} ${flagEmoji(u.country)} ${w}</div>
<div>${u.best_score}</div>
</div>
`;

});

document.getElementById("players").innerHTML=phtml;

}

load();

</script>

</body>
</html>
