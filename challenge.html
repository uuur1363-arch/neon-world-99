<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta charset="UTF-8">
  <title>NEON WORLD '99 — CHALLENGE</title>
  <style>
    body{
      margin:0;
      padding:30px 16px 36px;
      background:
        radial-gradient(circle at top, rgba(0,212,255,.08), transparent 35%),
        radial-gradient(circle at bottom, rgba(255,45,107,.06), transparent 35%),
        #000;
      color:#fff;
      font-family:monospace;
      text-align:center;
      -webkit-user-select:none;
      user-select:none;
      -webkit-touch-callout:none;
    }

    h1{
      color:#00d4ff;
      margin:8px 0 12px;
      text-shadow:0 0 10px rgba(0,212,255,.22);
    }

    .sub{
      color:rgba(255,255,255,.72);
      font-size:12px;
      max-width:430px;
      margin:0 auto 18px;
      line-height:1.55;
    }

    .hero{
      max-width:460px;
      margin:0 auto 14px;
      padding:16px;
      border-radius:14px;
      border:1px solid rgba(0,212,255,.22);
      background:rgba(0,212,255,.06);
      color:#dffbff;
      font-size:13px;
      line-height:1.7;
    }

    .card{
      max-width:460px;
      margin:0 auto 14px;
      padding:18px 16px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.04);
      text-align:left;
    }

    .label{
      font-size:12px;
      color:#aaa;
      margin-bottom:6px;
    }

    .big{
      font-size:22px;
      color:#fff;
      font-weight:bold;
      word-break:break-word;
    }

    .muted{
      font-size:12px;
      color:#888;
      line-height:1.6;
    }

    .actions{
      max-width:460px;
      margin:18px auto 0;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .btn{
      width:100%;
      padding:14px;
      border:none;
      border-radius:12px;
      font-family:monospace;
      font-weight:bold;
      cursor:pointer;
      -webkit-tap-highlight-color:transparent;
    }

    .primary{
      background:#00d4ff;
      color:#000;
    }

    .secondary{
      background:#222;
      color:#ddd;
      border:1px solid #444;
    }

    .accent{
      color:#00d4ff;
    }

    .warn{
      color:#ffd166;
    }

    .danger{
      color:#ff8da1;
    }

    #status{
      max-width:460px;
      margin:12px auto 0;
      font-size:12px;
      color:#aaa;
      white-space:pre-wrap;
      line-height:1.5;
    }
  </style>
</head>
<body>

  <h1>YOU WERE CHALLENGED</h1>
  <div class="sub">
    Beat the posted score, prove your skill, and take the top spot.
  </div>

  <div class="hero" id="heroText">
    Loading challenge...
  </div>

  <div class="card">
    <div class="label">SCORE TO BEAT</div>
    <div id="score" class="big">Loading...</div>
  </div>

  <div class="card">
    <div class="label">CREATED BY</div>
    <div id="creator" class="big">Loading...</div>
  </div>

  <div class="card">
    <div class="label">CITY</div>
    <div id="city" class="big">Loading...</div>
  </div>

  <div class="card">
    <div class="label">COUNTRY</div>
    <div id="country" class="big">Loading...</div>
  </div>

  <div class="card">
    <div class="label">BOUNTY</div>
    <div id="bounty" class="big">Loading...</div>
  </div>

  <div class="card">
    <div class="label">STATUS</div>
    <div id="challengeStatus" class="big">Loading...</div>
    <div id="extraInfo" class="muted" style="margin-top:8px;"></div>
  </div>

  <div class="actions">
    <button id="playBtn" class="btn primary">BEAT THIS SCORE</button>
    <button id="shareBtn" class="btn secondary">SHARE CHALLENGE</button>
    <button id="boardBtn" class="btn secondary">LEADERBOARD</button>
    <button id="homeBtn" class="btn secondary">HOME</button>
  </div>

  <div id="status"></div>

  <script>
    function shortWallet(w) {
      const s = String(w || "");
      if (!s) return "unknown";
      if (s.length <= 12) return s;
      return s.slice(0, 4) + "..." + s.slice(-4);
    }

    function getChallengeId() {
      const p = new URLSearchParams(window.location.search);
      return String(p.get("id") || "").trim();
    }

    function setStatus(msg, isError = false) {
      const el = document.getElementById("status");
      el.textContent = msg || "";
      el.style.color = isError ? "#ff8da1" : "#aaa";
    }

    async function loadChallenge() {
      const id = getChallengeId();

      if (!id) {
        document.getElementById("score").textContent = "—";
        document.getElementById("creator").textContent = "—";
        document.getElementById("city").textContent = "—";
        document.getElementById("country").textContent = "—";
        document.getElementById("bounty").textContent = "—";
        document.getElementById("challengeStatus").textContent = "INVALID";
        document.getElementById("heroText").innerHTML = `Challenge link is invalid.`;
        setStatus("Missing challenge id in URL.", true);
        return;
      }

      try {
        const r = await fetch(`/api/challenge?id=${encodeURIComponent(id)}`, {
          method: "GET"
        });

        let j = {};
        try {
          j = await r.json();
        } catch {}

        if (!r.ok || !j.ok || !j.challenge) {
          document.getElementById("score").textContent = "—";
          document.getElementById("creator").textContent = "—";
          document.getElementById("city").textContent = "—";
          document.getElementById("country").textContent = "—";
          document.getElementById("bounty").textContent = "—";
          document.getElementById("challengeStatus").textContent = "NOT FOUND";
          document.getElementById("heroText").innerHTML = `This challenge could not be found.`;
          setStatus(j.error || "Challenge not found.", true);
          return;
        }

        const c = j.challenge;
        const score = Number(c.score_to_beat || 0);
        const creator = shortWallet(c.creator_wallet);
        const city = String(c.city || "unknown");
        const country = String(c.country || "unknown");
        const bounty = Number(c.bounty_sol || 0).toFixed(3);
        const statusText = String(c.status || "open").toUpperCase();
        const winnerWallet = shortWallet(c.winner_wallet || "");
        const winningScore = Number(c.winning_score || 0);

        document.getElementById("score").textContent = String(score);
        document.getElementById("creator").textContent = creator;
        document.getElementById("city").textContent = city;
        document.getElementById("country").textContent = country;
        document.getElementById("bounty").textContent = `${bounty} SOL`;
        document.getElementById("challengeStatus").textContent = statusText;

        if (String(c.status || "") === "claimed") {
          document.getElementById("heroText").innerHTML =
            `This challenge was already <span class="warn">beaten</span>.<br>` +
            `Top score: <span class="accent">${winningScore}</span><br>` +
            `New leader: <span class="accent">${winnerWallet}</span><br>` +
            `<span class="warn">Take revenge and beat it back.</span>`;

          document.getElementById("extraInfo").textContent =
            `Winner: ${winnerWallet} • Score: ${winningScore}`;

          document.getElementById("playBtn").textContent = "TAKE REVENGE";
        } else {
          document.getElementById("heroText").innerHTML =
            `A player challenged you to beat <span class="accent">${score}</span> points in <span class="accent">${city}</span>.`;

          document.getElementById("extraInfo").textContent =
            `Week: ${String(c.week_key || "")}`;

          document.getElementById("playBtn").textContent = "BEAT THIS SCORE";
        }

        setStatus("Challenge loaded.");
      } catch (e) {
        document.getElementById("challengeStatus").textContent = "ERROR";
        document.getElementById("heroText").innerHTML = `Challenge could not be loaded.`;
        setStatus(`Failed to load challenge: ${String(e.message || e)}`, true);
      }
    }

    document.getElementById("playBtn").addEventListener("click", () => {
      const id = getChallengeId();

      if (!id) {
        setStatus("Challenge id missing.", true);
        return;
      }

      try {
        localStorage.setItem("neon99_active_challenge", id);
      } catch {}

      window.location.href = "/city.html";
    });

    document.getElementById("shareBtn").addEventListener("click", async () => {
      const url = window.location.href;
      const score = document.getElementById("score").textContent || "0";
      const city = document.getElementById("city").textContent || "unknown";

      const text =
        `🔥 Neon World '99 Challenge\n\n` +
        `Score to beat: ${score}\n` +
        `Stage: ${city}\n\n` +
        `Think you can beat me?\n\n` +
        `${url}`;

      if (navigator.share) {
        try {
          await navigator.share({
            title: "Neon World '99 Challenge",
            text
          });
          return;
        } catch {}
      }

      window.location.href =
        `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`;
    });

    document.getElementById("boardBtn").addEventListener("click", () => {
      window.location.href = "/board.html";
    });

    document.getElementById("homeBtn").addEventListener("click", () => {
      window.location.href = "/index.html";
    });

    loadChallenge();
  </script>

</body>
</html>
